name: Deploy Frontend to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build y Push imagen a ECR
        run: |
          docker build -t tienda-perritos-frontend .
          docker tag tienda-perritos-frontend:latest 481027514113.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:latest
          docker push 481027514113.dkr.ecr.us-east-1.amazonaws.com/tienda-perritos-frontend:latest

      - name: Deploy a ECS
        run: |
          aws ecs update-service \
            --cluster innovatech-cluster \
            --service frontend \
            --force-new-deployment \
            --region us-east-1